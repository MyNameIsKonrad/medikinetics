<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Medikinetics">
<meta name="theme-color" content="#080d17">
<title>Medikinetics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #080d17; --surface: #0f1623; --border: #1a2235;
  --muted: #2d3f57; --dim: #3a5070; --soft: #4a6080;
  --text: #dce8f5; --ir: #5bb8f5; --cr: #b08860; --green: #4ecb8d;
  --now: #ff6b6b; --clearing: #7a6248; --rising: #94b8d4;
  --toast-text: #8ba3be; --tooltip-bg: #0a1020;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased; overscroll-behavior: none; touch-action: manipulation; }
#app { max-width: 440px; margin: 0 auto;
  padding: calc(var(--safe-top) + 24px) 20px calc(var(--safe-bot) + 48px); }
.mono { font-family: 'DM Mono', monospace; }
.header { margin-bottom: 24px; }
.title { font-size: 20px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim);
  letter-spacing: .14em; text-transform: uppercase; margin-top: 3px; }
/* Stats */
.stats-row { display: flex; align-items: center; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; margin-bottom: 28px; }
.stat { flex: 1; }
.stat-val { font-size: 40px; font-weight: 700; line-height: 1;
  display: flex; align-items: baseline; gap: 2px; }
.stat-val .unit { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 2px; }
.stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim);
  text-transform: uppercase; letter-spacing: .1em; margin-top: 6px; }
.stat-divider { width: 1px; height: 52px; background: var(--border); margin: 0 20px; }
/* Section */
.section { margin-bottom: 24px; }
.section-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim);
  text-transform: uppercase; letter-spacing: .14em; margin-bottom: 12px; }
/* Chart */
.chart-wrap { background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 12px 8px; position: relative; }
.chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.chart-est { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; }
#chart-svg { width: 100%; display: block; overflow: visible; }
.chart-tooltip { position: absolute; background: var(--tooltip-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; pointer-events: none; display: none; z-index: 10; }
.chart-tooltip .tt-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim); }
.chart-tooltip .tt-val { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--ir); margin-top: 2px; }
.chart-tooltip .tt-unit { font-size: 10px; color: var(--dim); margin-left: 4px; }
/* Dose buttons */
.dose-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.dose-btn { display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 14px 8px; background: transparent; border: 1.5px solid; border-radius: 16px;
  cursor: pointer; touch-action: manipulation; transition: opacity .15s, transform .15s ease-out; }
.dose-btn.pressing, .dose-btn:active { transform: scale(0.91); transition: transform .08s ease-in; }
.dose-btn.just-fired { opacity: .35; }
.dose-btn-name { font-size: 16px; font-weight: 700; letter-spacing: .04em; }
.dose-btn-sub { font-family: 'DM Mono', monospace; font-size: 10px; opacity: .6; }
/* Offset chips */
.offset-row { display: flex; gap: 8px; flex-wrap: nowrap; }
.offset-chip { flex: 1; font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 8px;
  border-radius: 20px; border: 1px solid var(--border); background: transparent; text-align: center;
  color: var(--dim); cursor: pointer; touch-action: manipulation; transition: border-color .15s, background .15s, color .15s, transform .15s ease-out; }
.offset-chip.active { border-color: var(--ir); background: rgba(91,184,245,.12); color: var(--ir); }
.offset-chip.pressing, .offset-chip:active { transform: scale(0.90); transition: border-color .15s, background .15s, color .15s, transform .08s ease-in; }
.offset-chip-unset { opacity: .75; }
.time-input-row { display: none; align-items: center; gap: 8px; margin-top: 8px; }
/* Fed/fasted toggle switch on CR pill cards */
.pill-card:has(.fed-toggle) .card-head { margin-bottom: 8px; }
.fed-toggle { display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer; touch-action: manipulation; margin-bottom: 8px;
  transition: transform .15s ease-out; }
.fed-toggle.pressing, .fed-toggle:active { transform: scale(0.95); transition: transform .08s ease-in; }
.fed-lbl { font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); transition: color .15s; }
.fed-lbl--on { color: var(--soft); }
.fed-track { width: 36px; height: 20px; border-radius: 10px;
  background: var(--border); position: relative;
  transition: background .2s; flex-shrink: 0; }
.fed-track--fed { background: rgba(176,136,96,.18); }
.fed-thumb { position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 8px;
  background: var(--muted); transition: transform .2s, background .2s; }
.fed-track--fed .fed-thumb { transform: translateX(16px); background: #b08860; }
.manual-time-input { font-family: 'DM Mono', monospace; font-size: 12px;
  background: transparent; border: 1px solid var(--ir); border-radius: 8px;
  color: var(--text); padding: 5px 10px; width: 120px; color-scheme: dark; }
/* Card */
.pill-card { background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-head-left { display: flex; align-items: baseline; gap: 8px; }
.card-type { font-size: 15px; font-weight: 700; }
.card-mg { font-size: 13px; color: var(--soft); }
.card-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim); }
/* Phase bar */
.phase-row { margin-bottom: 8px; }
.phase-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.phase-mg { font-size: 13px; font-weight: 600; }
.phase-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); margin-left: 5px; }
.phase-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim); }
.track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.fill-bar { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
/* Log */
.log-row { display: flex; align-items: center; gap: 8px;
  padding: 12px 0; border-bottom: 1px solid var(--surface); }
.log-row.expired { opacity: .3; }
.log-type { font-size: 13px; font-weight: 700; min-width: 36px; }
.log-mg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--soft); min-width: 44px; }
.log-t { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim); flex: 1; }
.log-status { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
/* Buttons */
.x-btn { background: none; border: none; color: var(--muted); font-size: 20px;
  line-height: 1; cursor: pointer; padding: 8px; margin: -8px; touch-action: manipulation;
  transition: transform .15s ease-out; }
.x-btn.pressing, .x-btn:active { transform: scale(0.80); transition: transform .08s ease-in; }
/* Focus */
:focus-visible { outline: 2px solid var(--ir); outline-offset: 2px; border-radius: 4px; }
/* Empty */
.empty { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted);
  text-align: center; padding: 52px 0; }
/* Undo toast */
#undo-toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--border); border: 1px solid var(--soft); border-radius: 12px;
  padding: 12px 18px; display: none; align-items: center; gap: 14px;
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--toast-text);
  box-shadow: 0 4px 24px rgba(0,0,0,.5); white-space: nowrap; z-index: 100;
  overflow: hidden; }
#undo-toast.visible { display: flex; }
#undo-toast.visible::after { content: ''; position: absolute; bottom: 0; left: 0;
  height: 2px; background: var(--ir); border-radius: 0 0 12px 12px;
  animation: drain 8s linear forwards; }
@keyframes drain { from { width: 100%; } to { width: 0%; } }
#undo-btn { background: none; border: none; color: var(--ir); font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 700; cursor: pointer; padding: 0; letter-spacing: .06em;
  transition: transform .15s ease-out; }
#undo-btn.pressing, #undo-btn:active { transform: scale(0.88); transition: transform .08s ease-in; }
/* Simulation card */
.pill-card--sim { border-color: rgba(91,184,245,.2); border-style: dashed; opacity: .8; }
.sim-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim);
  text-transform: uppercase; letter-spacing: .06em; margin-top: 6px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">Medikinetics</div>
    <div class="sub">Medikinet IR · CR <span style="opacity:.4">· 20260425.1857</span></div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" style="color:var(--text)">
        <span id="val-taken">0</span><span class="unit">mg</span>
      </div>
      <div class="stat-label">taken today</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" style="color:var(--ir)">
        <span id="val-system">0.0</span><span class="unit">mg eq</span>
      </div>
      <div class="stat-label" id="label-system">in system</div>
    </div>
  </div>

  <div class="section">
    <div class="chart-header">
      <div class="section-label">concentration curve</div>
      <div class="chart-est">model estimate</div>
    </div>
    <div class="chart-wrap" id="chart-container">
      <svg id="chart-svg" height="170"></svg>
      <div class="chart-tooltip" id="chart-tooltip">
        <div class="tt-time" id="tt-time"></div>
        <div class="tt-val"><span id="tt-val">0.0</span><span class="tt-unit">mg eq</span></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">log dose</div>
    <div class="dose-grid" id="dose-grid"></div>
    <div class="offset-row" id="offset-row"></div>
    <div class="time-input-row" id="time-input-row">
      <input type="time" id="manual-time-input" class="manual-time-input">
      <span class="section-label" style="margin:0">set time</span>
    </div>
  </div>

  <div class="section" id="section-progress" style="display:none">
    <div class="section-label">in progress</div>
    <div id="cards-container"></div>
  </div>

  <div class="section" id="section-log" style="display:none">
    <div class="section-label">log (24h)</div>
    <div id="log-container"></div>
  </div>

  <div class="empty" id="empty-state">nothing logged yet</div>
</div>

<div id="undo-toast">
  <span id="undo-msg"></span>
  <button id="undo-btn" onclick="undoRemove()">UNDO</button>
</div>

<script>
// ── Med definitions ──────────────────────────────────────
const MEDS = {
  IRH: { label: 'IR ½', sublabel: '5mg split',     totalMg: 5,  color: '#5bb8f5',
         phases: [{ offsetHours: 0, mg: 5,  durationHours: 4, ka: 2.0 }] },
  IR:  { label: 'IR',   sublabel: 'Medikinet 10mg', totalMg: 10, color: '#5bb8f5',
         phases: [{ offsetHours: 0, mg: 10, durationHours: 4, ka: 2.0 }] },
  CR:  { label: 'CR',   sublabel: 'Medikinet 20mg', totalMg: 20, color: '#b08860',
         phases:       [{ offsetHours: 0, mg: 10, durationHours: 4, ka: 2.0 },
                        { offsetHours: 4, mg: 10, durationHours: 4, ka: 0.7 }],
         // ka=1.0: judgment call — ER beads release early without food but bead matrix
         // still slows absorption vs pure IR. Yields Tmax ~1.6h, consistent with
         // Haessler 2008 "steady absorption / single Tmax" under fasted conditions.
         fastedPhases: [{ offsetHours: 0, mg: 20, durationHours: 6, ka: 1.0 }] },
};

const OFFSETS = [
  { label: '-30m', ms: 30 * 60000 },
  { label: '-1h',  ms: 1 * 3600000 },
  { label: '-2h',  ms: 2 * 3600000 },
  { label: '-3h',  ms: 3 * 3600000 },
  { label: 'now',  ms: 0 },
];
const SCRUB_IDX = -1;

// ── PK model ─────────────────────────────────────────────
const KA_REF = 2.0, KE = 0.347;
const _tm = Math.log(KA_REF / KE) / (KA_REF - KE);
const _cm = (KA_REF / (KA_REF - KE)) * (Math.exp(-KE * _tm) - Math.exp(-KA_REF * _tm));
const NORM = 1 / _cm;

function phaseConc(mg, tH, ka) {
  if (tH < 0) return 0;
  if (Math.abs(ka - KE) < 0.001) {
    return Math.max(0, mg * NORM * KE * tH * Math.exp(-KE * tH));
  }
  return Math.max(0, mg * NORM * (ka / (ka - KE)) * (Math.exp(-KE * tH) - Math.exp(-ka * tH)));
}

function phasesFor(pill) {
  return (pill.type === 'CR' && !pill.fed) ? MEDS.CR.fastedPhases : MEDS[pill.type].phases;
}

function concAtTime(pills, ts) {
  let total = 0;
  for (const p of pills)
    for (const ph of phasesFor(p))
      total += phaseConc(ph.mg, (ts - (p.takenAt + ph.offsetHours * 3600000)) / 3600000, ph.ka);
  return total;
}

function buildCurve(pills, wStart, wEnd) {
  const pts = [];
  for (let ts = wStart; ts <= wEnd; ts += 10 * 60000) {
    let total = 0;
    const perPill = {};
    for (const p of pills) {
      let pt = 0;
      for (const ph of phasesFor(p))
        pt += phaseConc(ph.mg, (ts - (p.takenAt + ph.offsetHours * 3600000)) / 3600000, ph.ka);
      perPill[p.id] = Math.round(pt * 10) / 10;
      total += pt;
    }
    pts.push({ ts, total: Math.round(total * 10) / 10, ...perPill });
  }
  return pts;
}

function getCurveWindow(pills, now) {
  if (!pills.length) return { start: now - 1800000, end: now + 8 * 3600000 };
  const sod = startOfLocalDay();
  const todayDoses = pills.filter(p => p.takenAt >= sod);
  const earliest = todayDoses.length
    ? Math.min(...todayDoses.map(p => p.takenAt))
    : now;
  const latest = Math.max(...pills.map(p => {
    const lp = MEDS[p.type].phases.at(-1);
    return p.takenAt + (lp.offsetHours + lp.durationHours) * 3600000;
  }));
  return {
    start: Math.min(earliest - 45 * 60000, now - 60 * 60000),
    end:   Math.max(latest + 4 * 3600000, now + 90 * 60000),
  };
}

// ── Helpers ───────────────────────────────────────────────
const fmt = ts => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
function startOfLocalDay() { const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime(); }
const phaseStart = (ph, t) => t + ph.offsetHours * 3600000;
const phaseEnd   = (ph, t) => phaseStart(ph, t) + ph.durationHours * 3600000;

function phaseStatus(ph, takenAt, now) {
  const s = phaseStart(ph, takenAt), e = phaseEnd(ph, takenAt);
  return now < s ? 'pending' : now < e ? 'active' : 'done';
}
function phasePct(ph, takenAt, now) {
  const s = phaseStart(ph, takenAt), e = phaseEnd(ph, takenAt);
  if (now < s) return 0; if (now >= e) return 100;
  return ((now - s) / (e - s)) * 100;
}
function durStr(ms) {
  if (ms <= 0) return null;
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function pillIsVisible(pill, now) {
  const lp = phasesFor(pill).at(-1);
  return now < phaseEnd(lp, pill.takenAt) || concAtTime([pill], now) >= MEDS[pill.type].totalMg * 0.1;
}

// ── State ─────────────────────────────────────────────────
let pills          = [];
let simulatedPills = []; // ephemeral — never saved, cleared on real dose or preset chip
let offsetIdx = OFFSETS.length - 1; // default: 'now'
let scrubTime = null; // { ts, label } — set by chart scrub or manual entry
let undoItem  = null;
let undoTimer = null;
let hideTimer = null;

function loadPills() {
  try {
    const raw = localStorage.getItem('medikinetics-v1');
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    const cutoff = Date.now() - 48 * 3600000;
    return parsed.filter(p => p && p.takenAt > cutoff && typeof p.type === 'string' && MEDS[p.type]);
  } catch (e) { console.error('MedKit: load failed', e); return []; }
}

function savePills() {
  try { localStorage.setItem('medikinetics-v1', JSON.stringify(pills)); }
  catch (e) { console.error('MedKit: save failed', e); }
}

function logPill(type) {
  const now = Date.now();
  const rawAt = offsetIdx === SCRUB_IDX && scrubTime
    ? scrubTime.ts
    : now - OFFSETS[offsetIdx].ms;

  if (rawAt > now) {
    // Future time → preview only, not persisted
    simulatedPills = [{ id: now, type, takenAt: rawAt, sim: true, ...(type === 'CR' ? { fed: false } : {}) }];
    render();
    return;
  }

  document.querySelectorAll('.dose-btn').forEach(b => {
    b.disabled = true;
    b.classList.add('just-fired');
    setTimeout(() => { b.disabled = false; b.classList.remove('just-fired'); }, 400);
  });
  simulatedPills = [];
  pills = [{ id: now, type, takenAt: Math.min(now, rawAt), ...(type === 'CR' ? { fed: false } : {}) }, ...pills];
  savePills();
  offsetIdx = OFFSETS.length - 1;
  scrubTime = null;
  document.getElementById('time-input-row').style.display = 'none';
  render();
}

function toggleFed(id) {
  const pill = pills.find(p => p.id === id);
  if (!pill) return;
  pill.fed = !pill.fed;
  savePills();

  // Toggle classes directly so the CSS slide transition plays (full render destroys the element)
  const card = document.querySelector(`.pill-card[data-id="${id}"]`);
  if (card) {
    card.querySelector('.fed-track')?.classList.toggle('fed-track--fed', pill.fed);
    const lbls = card.querySelectorAll('.fed-lbl');
    lbls[0]?.classList.toggle('fed-lbl--on', !pill.fed);
    lbls[1]?.classList.toggle('fed-lbl--on', pill.fed);
  }

  // Update chart + stats without rebuilding cards
  const now    = Date.now();
  const today  = pills.filter(p => p.takenAt > now - 24 * 3600000);
  const inSys  = concAtTime(today, now);
  const rising = concAtTime(today, now + 5 * 60000) > inSys;
  const taken  = today.filter(p => p.takenAt >= startOfLocalDay()).reduce((s, p) => s + MEDS[p.type].totalMg, 0);
  document.getElementById('val-taken').textContent  = taken;
  document.getElementById('val-system').textContent = inSys.toFixed(1);
  document.getElementById('label-system').innerHTML = rising
    ? '<span style="color:var(--rising)">↑ rising</span>' : 'in system';
  renderChart(today, simulatedPills, now);
}

function clearSim() {
  simulatedPills = [];
  render();
}

function removePill(id) {
  const pill = pills.find(p => p.id === id);
  if (!pill) return;
  pills = pills.filter(p => p.id !== id);
  savePills();
  undoItem = pill;
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { undoItem = null; hideUndo(); }, 8000);
  showUndo(pill);
  render();
}

function undoRemove() {
  if (!undoItem) return;
  clearTimeout(undoTimer);
  pills = [undoItem, ...pills].sort((a, b) => b.takenAt - a.takenAt);
  savePills();
  undoItem = null;
  hideUndo();
  render();
}

function showUndo(pill) {
  document.getElementById('undo-msg').textContent =
    `${MEDS[pill.type].label} ${MEDS[pill.type].totalMg}mg deleted`;
  document.getElementById('undo-toast').classList.add('visible');
}
function hideUndo() {
  document.getElementById('undo-toast').classList.remove('visible');
}

// ── Chart ─────────────────────────────────────────────────
let chartData = null;
let chartWin  = null;

function renderChart(today, simulated, now) {
  const svg    = document.getElementById('chart-svg');
  const W      = svg.clientWidth || 380;
  const CH     = 140; // curve height
  const XPAD   = 28;  // left padding for y-axis labels
  const BPAD   = 20;  // bottom for x-axis labels
  const H      = CH + BPAD;
  svg.setAttribute('height', H);

  const allPills = [...today, ...simulated];
  const win  = getCurveWindow(allPills, now);
  const data = buildCurve(allPills, win.start, win.end);
  chartData  = data;
  chartWin   = win;

  const CW = W - XPAD;
  const xS = ts => XPAD + (ts - win.start) / (win.end - win.start) * CW;
  const maxConc = Math.max(...data.map(d => d.total), 5);
  const yS = v  => CH - (v / (maxConc * 1.2)) * CH;

  // X ticks — step adapts to window width
  const xTicks = [];
  const winDur = win.end - win.start;
  const step = winDur > 16 * 3600000 ? 4 * 3600000 : winDur > 8 * 3600000 ? 2 * 3600000 : 3600000;
  const tStart = Math.ceil(win.start / step) * step;
  for (let t = tStart; t <= win.end; t += step) xTicks.push(t);

  // Y ticks
  const yTicks = [0, Math.round(maxConc * 0.5), Math.round(maxConc)];

  // Per-pill fills — simulated get faint fill + dashed outline
  const pillFills = allPills.map(pill => {
    const color = MEDS[pill.type].color;
    const pts = data.map(d => ({ x: xS(d.ts), y: yS(d[pill.id] || 0) }));
    const poly = [
      `${pts[0].x},${CH}`,
      ...pts.map(p => `${p.x},${p.y}`),
      `${pts.at(-1).x},${CH}`
    ].join(' ');
    if (pill.sim) {
      const linePoly = pts.map(p => `${p.x},${p.y}`).join(' ');
      return `<polygon points="${poly}" fill="${color}" fill-opacity="0.04"/>
        <polyline points="${linePoly}" fill="none" stroke="${color}" stroke-width="1" stroke-opacity=".35" stroke-dasharray="4,4"/>`;
    }
    return `<polygon points="${poly}" fill="${color}" fill-opacity="0.1"/>`;
  }).join('');

  // Total line — if simulation exists, draw confirmed solid + projected dashed
  const totalPts = data.map(d => ({ x: xS(d.ts), y: yS(d.total) }));
  const polyPts  = [`${totalPts[0].x},${CH}`, ...totalPts.map(p => `${p.x},${p.y}`), `${totalPts.at(-1).x},${CH}`].join(' ');
  const linePts  = totalPts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x},${p.y}`).join(' ');
  let totalLinesSVG;
  if (simulated.length) {
    const confData   = buildCurve(today, win.start, win.end);
    const confPts    = confData.map(d => ({ x: xS(d.ts), y: yS(d.total) }));
    const confPoly   = [`${confPts[0].x},${CH}`, ...confPts.map(p => `${p.x},${p.y}`), `${confPts.at(-1).x},${CH}`].join(' ');
    const confLine   = confPts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x},${p.y}`).join(' ');
    totalLinesSVG = `
      <polygon points="${confPoly}" fill="url(#tg)"/>
      <path d="${linePts}" fill="none" stroke="#5bb8f5" stroke-width="1.5" stroke-opacity=".3" stroke-dasharray="5,4" stroke-linecap="round"/>
      <path d="${confLine}" fill="none" stroke="#5bb8f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  } else {
    totalLinesSVG = `
      <polygon points="${polyPts}" fill="url(#tg)"/>
      <path d="${linePts}" fill="none" stroke="#5bb8f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  // Now line
  const nowX = Math.max(XPAD, Math.min(W, xS(now)));

  // Phase markers — sim get dashed + "sim" label
  const markers = allPills.map(pill => {
    const ts = pill.takenAt;
    if (ts < win.start || ts > win.end) return '';
    const x = xS(ts);
    const color = MEDS[pill.type].color;
    if (pill.sim) {
      const lx = Math.min(x + 3, W - 24);
      return `<line x1="${x}" y1="0" x2="${x}" y2="${CH}" stroke="${color}" stroke-width="1.5" stroke-opacity=".5" stroke-dasharray="3,3"/>
        <text x="${lx}" y="22" font-family="'DM Mono',monospace" font-size="8" fill="${color}" fill-opacity=".7">sim</text>`;
    }
    return `<line x1="${x}" y1="0" x2="${x}" y2="${CH}" stroke="${color}" stroke-width="1" stroke-opacity=".3" stroke-dasharray="2,4"/>`;
  }).join('');

  svg.innerHTML = `
    <defs>
      <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5bb8f5" stop-opacity=".28"/>
        <stop offset="100%" stop-color="#5bb8f5" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    ${yTicks.map(v => `
      <text x="${XPAD - 4}" y="${yS(v) + 3}" font-family="'DM Mono',monospace" font-size="10"
        style="fill:var(--dim)" text-anchor="end">${v}</text>
      <line x1="${XPAD}" y1="${yS(v)}" x2="${W}" y2="${yS(v)}" stroke="#1a2235" stroke-width="${v === 0 ? 1 : 0.5}"/>
    `).join('')}
    ${pillFills}
    ${totalLinesSVG}
    ${markers}
    <line x1="${nowX}" y1="0" x2="${nowX}" y2="${CH}" style="stroke:var(--now)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="${Math.min(nowX + 4, W - 28)}" y="12" font-family="'DM Mono',monospace" font-size="10" style="fill:var(--now)">now</text>
    ${xTicks.map(ts => {
      const x = xS(ts);
      if (x < XPAD + 10 || x > W - 10) return '';
      return `<text x="${x}" y="${CH + 14}" font-family="'DM Mono',monospace" font-size="10" style="fill:var(--dim)" text-anchor="middle">${fmt(ts)}</text>`;
    }).join('')}
    <g id="dot-layer"></g>
    <line id="chart-crosshair" x1="-999" y1="0" x2="-999" y2="${CH}"
      stroke="rgba(220,232,245,0.25)" stroke-width="1"/>
    <rect x="${XPAD}" y="0" width="${CW}" height="${CH}" fill="transparent" id="chart-hit"/>
  `;

  // Touch/mouse tooltip + crosshair
  const hit      = document.getElementById('chart-hit');
  const tooltip  = document.getElementById('chart-tooltip');
  const crosshair = document.getElementById('chart-crosshair');
  function showTooltip(clientX, clientY) {
    if (!chartData || !chartWin) return;
    const rect = svg.getBoundingClientRect();
    const relX = clientX - rect.left - XPAD;
    const fracX = Math.max(0, Math.min(1, relX / CW));
    const ts = chartWin.start + fracX * (chartWin.end - chartWin.start);
    const closest = chartData.reduce((best, p) =>
      Math.abs(p.ts - ts) < Math.abs(best.ts - ts) ? p : best);
    // crosshair
    const cx = XPAD + fracX * CW;
    crosshair.setAttribute('x1', cx);
    crosshair.setAttribute('x2', cx);
    // scrub chip — write time without re-render (past or future, for inspection)
    scrubTime = { ts: closest.ts, label: fmt(closest.ts) };
    const scrubChip = document.querySelector('#offset-row .offset-chip');
    if (scrubChip) {
      scrubChip.textContent = scrubTime.label;
      scrubChip.classList.remove('offset-chip-unset');
    }
    // intersection dots
    const dotLayer = document.getElementById('dot-layer');
    if (dotLayer) {
      dotLayer.innerHTML = allPills.map(pill => {
        const v = concAtTime([pill], closest.ts);
        const r = pill.sim ? 2.5 : 3;
        return `<circle cx="${cx}" cy="${yS(v)}" r="${r}" fill="${MEDS[pill.type].color}" stroke="var(--bg)" stroke-width="1.5" opacity="${pill.sim ? .5 : 1}"/>`;
      }).join('') +
      `<circle cx="${cx}" cy="${yS(closest.total)}" r="4" fill="none" stroke="#5bb8f5" stroke-width="1.5"/>`;
    }
    // tooltip
    document.getElementById('tt-time').textContent = fmt(closest.ts);
    document.getElementById('tt-val').textContent  = closest.total.toFixed(1);
    const tLeft = Math.min(clientX - rect.left + 8, rect.width - 120);
    tooltip.style.left = tLeft + 'px';
    tooltip.style.top  = Math.max(4, clientY - rect.top - 60) + 'px';
    tooltip.style.display = 'block';
    if (hideTimer) clearTimeout(hideTimer);
  }

  function hideTooltip(delay = 0) {
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      tooltip.style.display = 'none';
      crosshair.setAttribute('x1', '-999');
      crosshair.setAttribute('x2', '-999');
      const dotLayer = document.getElementById('dot-layer');
      if (dotLayer) dotLayer.innerHTML = '';
    }, delay);
  }

  hit.addEventListener('touchstart', e => {
    showTooltip(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  hit.addEventListener('touchmove', e => {
    showTooltip(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });
  hit.addEventListener('touchend', () => hideTooltip(2500));
  hit.addEventListener('mousemove',  e => showTooltip(e.clientX, e.clientY));
  hit.addEventListener('mouseleave', () => hideTooltip(0));
}

// ── Render ────────────────────────────────────────────────
function render() {
  const now   = Date.now();
  const today = pills.filter(p => p.takenAt > now - 24 * 3600000);

  // Stats
  const taken    = today.filter(p => p.takenAt >= startOfLocalDay()).reduce((s, p) => s + MEDS[p.type].totalMg, 0);
  const inSystem = concAtTime(today, now);
  const isRising = concAtTime(today, now + 5 * 60000) > inSystem;

  document.getElementById('val-taken').textContent  = taken;
  document.getElementById('val-system').textContent = inSystem.toFixed(1);
  document.getElementById('label-system').innerHTML = isRising
    ? '<span style="color:var(--rising)">↑ rising</span>'
    : 'in system';

  // Chart
  renderChart(today, simulatedPills, now);

  // Dose buttons (static, only build once)
  const dg = document.getElementById('dose-grid');
  if (!dg.children.length) {
    Object.entries(MEDS).forEach(([type, def]) => {
      const btn = document.createElement('button');
      btn.className = 'dose-btn';
      btn.style.borderColor = def.color;
      btn.style.color = def.color;
      btn.innerHTML = `<span class="dose-btn-name">${def.label}</span><span class="dose-btn-sub">${def.sublabel}</span>`;
      btn.onclick = () => logPill(type);
      dg.appendChild(btn);
    });
  }

  // Offset chips
  const or = document.getElementById('offset-row');
  const scrubLabel = scrubTime ? scrubTime.label : '--:--';
  or.innerHTML =
    `<button class="offset-chip ${offsetIdx === SCRUB_IDX ? 'active' : ''} ${!scrubTime ? 'offset-chip-unset' : ''}" onclick="selectScrubChip()">${scrubLabel}</button>` +
    OFFSETS.map((o, i) => `<button class="offset-chip ${i === offsetIdx ? 'active' : ''}" onclick="setOffset(${i})">${o.label}</button>`).join('');

  // In progress — sim cards first, then active confirmed doses
  const inProgress = today.filter(p => pillIsVisible(p, now));
  const allCards   = [...simulatedPills, ...inProgress];
  const secP = document.getElementById('section-progress');
  const cc   = document.getElementById('cards-container');
  if (allCards.length) {
    secP.style.display = '';
    cc.innerHTML = allCards.map(p => pillCardHTML(p, now)).join('');
  } else {
    secP.style.display = 'none';
  }

  // Log
  const secL = document.getElementById('section-log');
  const lc   = document.getElementById('log-container');
  if (today.length) {
    secL.style.display = '';
    lc.innerHTML = today.map(p => logRowHTML(p, now)).join('');
  } else {
    secL.style.display = 'none';
  }

  document.getElementById('empty-state').style.display = today.length ? 'none' : '';
}

function setOffset(i) {
  offsetIdx = i;
  simulatedPills = [];
  document.getElementById('time-input-row').style.display = 'none';
  render();
}

function selectScrubChip() {
  offsetIdx = SCRUB_IDX;
  document.querySelectorAll('#offset-row .offset-chip').forEach((btn, i) => {
    btn.classList.toggle('active', i === 0);
  });
  const input = document.getElementById('manual-time-input');
  if (scrubTime) {
    input.value = scrubTime.label;
  } else {
    const d = new Date();
    input.value = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  }
  document.getElementById('time-input-row').style.display = 'flex';
}

function pillCardHTML(pill, now) {
  const def = MEDS[pill.type];

  if (pill.sim) {
    return `
    <div class="pill-card pill-card--sim">
      <div class="card-head">
        <div class="card-head-left">
          <span class="card-type" style="color:${def.color}">${def.label}</span>
          <span class="card-mg">${def.totalMg} mg</span>
          <span class="card-time">${fmt(pill.takenAt)}</span>
        </div>
        <button class="x-btn" onclick="clearSim()">×</button>
      </div>
      <div class="sim-label">preview · not logged</div>
    </div>`;
  }

  const phases  = phasesFor(pill);
  const allDone = phases.every(ph => phaseStatus(ph, pill.takenAt, now) === 'done');

  let body;
  if (allDone) {
    const conc      = concAtTime([pill], now);
    const threshold = def.totalMg * 0.1;
    const minsLeft  = conc > threshold ? Math.round((Math.log(conc / threshold) / KE) * 60) : 0;
    const timeStr   = durStr(minsLeft * 60000) ?? '—';
    body = `
      <div class="phase-row">
        <div class="phase-top">
          <span class="phase-mg" style="color:var(--soft)">clearing · ${conc.toFixed(1)} mg eq</span>
          <span class="phase-time">${timeStr} left</span>
        </div>
      </div>`;
  } else {
    body = phases.map((ph, i) => {
      const st  = phaseStatus(ph, pill.takenAt, now);
      const pct = phasePct(ph, pill.takenAt, now);
      const left  = durStr(phaseEnd(ph, pill.takenAt) - now);
      const until = durStr(phaseStart(ph, pill.takenAt) - now);
      const color  = st === 'active' ? def.color : st === 'pending' ? 'var(--soft)' : 'var(--muted)';
      const fillBg = st === 'active' ? def.color : 'var(--border)';
      const tag  = i > 0 ? `<span class="phase-tag">+${ph.offsetHours}h release</span>` : '';
      const time = st === 'active' && left   ? `${left} left`
                 : st === 'pending' && until ? `in ${until}` : 'done';
      return `
        <div class="phase-row">
          <div class="phase-top">
            <span class="phase-mg" style="color:${color}">${ph.mg} mg${tag}</span>
            <span class="phase-time">${time}</span>
          </div>
          <div class="track"><div class="fill-bar" style="width:${pct}%;background:${fillBg}"></div></div>
        </div>`;
    }).join('');
  }

  return `
    <div class="pill-card" data-id="${pill.id}">
      <div class="card-head">
        <div class="card-head-left">
          <span class="card-type" style="color:${def.color}">${def.label}</span>
          <span class="card-mg">${def.totalMg} mg</span>
          <span class="card-time">${fmt(pill.takenAt)}</span>
        </div>
        <button class="x-btn" onclick="removePill(${pill.id})">×</button>
      </div>
      ${pill.type === 'CR' ? `
      <div class="fed-toggle" onclick="toggleFed(${pill.id})">
        <span class="fed-lbl${!pill.fed ? ' fed-lbl--on' : ''}">fasted</span>
        <div class="fed-track${pill.fed ? ' fed-track--fed' : ''}"><div class="fed-thumb"></div></div>
        <span class="fed-lbl${pill.fed ? ' fed-lbl--on' : ''}">food</span>
      </div>` : ''}
      ${body}
    </div>`;
}

function logRowHTML(pill, now) {
  const def      = MEDS[pill.type];
  const visible  = pillIsVisible(pill, now);
  const conc     = concAtTime([pill], now);
  const rising   = concAtTime([pill], now + 5 * 60000) > conc;
  const allDone  = phasesFor(pill).every(ph => phaseStatus(ph, pill.takenAt, now) === 'done');
  const clearing = visible && allDone;
  const st = !visible ? 'done' : rising ? '↑ rising' : clearing ? 'clearing' : 'active';
  const sc = !visible ? 'var(--muted)' : clearing ? 'var(--clearing)' : 'var(--green)';
  return `
    <div class="log-row ${visible ? '' : 'expired'}">
      <span class="log-type" style="color:${def.color}">${def.label}</span>
      <span class="log-mg">${def.totalMg} mg</span>
      <span class="log-t">${fmt(pill.takenAt)}</span>
      <span class="log-status" style="color:${sc}">${st}</span>
      <button class="x-btn" onclick="removePill(${pill.id})">×</button>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────
pills = loadPills();
render();
setInterval(render, 30000);

document.getElementById('manual-time-input').addEventListener('change', e => {
  const val = e.target.value; // "HH:MM"
  if (!val) return;
  const [h, m] = val.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  // if the resulting time is in the future, assume yesterday
  const ts = d.getTime() > Date.now() ? d.getTime() - 86400000 : d.getTime();
  scrubTime = { ts, label: val };
  offsetIdx = SCRUB_IDX;
  render();
});

// ── Press feedback (iOS :active workaround) ───────────────
(function() {
  const SEL = '.dose-btn, .offset-chip, .fed-toggle, .x-btn, #undo-btn';
  const MIN_MS = 90;
  document.addEventListener('touchstart', e => {
    const el = e.target.closest(SEL);
    if (!el || el.disabled) return;
    el.classList.add('pressing');
    el._pressAt = Date.now();
  }, { passive: true });
  document.addEventListener('touchend', () => {
    document.querySelectorAll('.pressing').forEach(el => {
      const delay = Math.max(0, MIN_MS - (Date.now() - (el._pressAt || 0)));
      setTimeout(() => el.classList.remove('pressing'), delay);
    });
  });
  document.addEventListener('touchcancel', () => {
    document.querySelectorAll('.pressing').forEach(el => el.classList.remove('pressing'));
  });
})();

// ── Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(e => console.error('SW failed', e));
  });
}

</script>
